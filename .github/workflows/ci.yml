name: Infralovers Container Build

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build:
    uses: infralovers/.github/.github/workflows/container.yml@main
    with:
      dockerfile: docker-image/Dockerfile
      score: 0
      platforms: "linux/amd64, linux/arm64"
      release: true
